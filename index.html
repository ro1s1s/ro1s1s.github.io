<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>جاري التحويل...</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding-top: 100px; background-color: #f0f2f5; }
        .loader { border: 8px solid #f3f3f3; border-top: 8px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="loader"></div>
    <h2 id="statusText">جارٍ التحقق والتحويل...</h2>

    <script>
        // 1. استخراج المتغير من الرابط
        const urlParams = new URLSearchParams(window.location.search);
        const destination = urlParams.get('to');
        
        // 2. تحديد الروابط
        const telegramUrl = "https://t.me/uUl8iPwh5iYTVk"; 
        const snapUrl = "https://www.snapchat.com/add/rossan2682"; 
        
        // 3. تحديد الوجهة النهائية
        let redirectUrl = telegramUrl; // افتراضياً يتجه للتليجرام
        if (destination === 'snap') {
            redirectUrl = snapUrl;
            document.getElementById('statusText').innerText = "جارٍ التحويل إلى سناب شات...";
        }

        // 4. تنفيذ العملية
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                console.log("IP Address:", data.ip);
                // هنا يتم تسجيل الـ IP أولاً ثم التحويل
                
                setTimeout(() => {
                    window.location.href = redirectUrl; 
                }, 2000);
            });
    </script>
</body>
</html>
